<style>
  * { box-sizing: border-box; }

          margin: 30px 0 4px; }
  .btn { display: inline-block; margin-top: 26px; padding: 11px 24px; text-decoration: none;
         color: #d7eef2; font-size: 14px; border: 1px solid rgba(111,208,223,.4);
         border-radius: 999px; transition: background .15s, border-color .15s; }
  .btn:hover { background: rgba(111,208,223,.12); border-color: #6fd0df; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
</style>
